<!DOCTYPE html>
<!-- Usando la versión HTML 5 -->
<html lang="es">
    <!-- <html> donde empieza y termina el código HTML
         lang="es" idioma del documento -->
    <head>
        <!-- <head> contiene informacion general del documento -->
        <!-- <meta> Es donde va la informacion: Autor, titulo, descripción de la pagina... -->
        <meta charset="UTF-8" />
        <meta name="description" content="esta es mi primera pagina web" />
        <meta name="autor" content="Daniel Pineda" />
        <meta name="keywords" content="primer sitio, primera pagina" />

        <title>Sintaxis basica de HTML 5</title>
        <!-- <title> Título de la pagina -->
    </head>
    <!-- <body> contenido de la pagina -->
    <body>
        Body de la pagina web
    </body>
</html>
